{% set name = "python-engineio" %}
{% set version = "4.13.0" %}
{% set ignore_tests = "--ignore=tests/common/test_client.py" %}
{% set tests_to_skip = "test_static_files" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name|replace('-', '_') }}-{{ version }}.tar.gz
  sha256: f9c51a8754d2742ba832c24b46ed425fdd3064356914edd5a1e8ffde76ab7709

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  skip: true  # [py<38]

requirements:
  host:
    - python
    - pip
    - setuptools >=61.2
  run:
    - python
    - simple-websocket >=0.10.0
  run_constrained:
    - requests >=2.21.0
    - websocket-client >=0.54.0
    - aiohttp >=3.4

# ModuleNotFoundError: No module named 'websocket'
# AssertionError: assert [b'Not Found'] == [b'<html>file</html>\n']
test:
  source_files:
    - tests
  imports:
    - engineio
    - engineio.middleware
    - engineio.packet
    - engineio.payload
    - engineio.server
    - engineio.socket
    - engineio.async_drivers
  requires:
    - pip
    - pytest
    - aiohttp
    - tornado
  commands:
    - pip check
    - python -c "from importlib.metadata import version; assert(version('{{ name }}')=='{{ version }}')"
    - pytest -v {{ ignore_tests }} -k "not {{ tests_to_skip }}" tests

about:
  home: https://github.com/miguelgrinberg/python-engineio
  license_file: LICENSE
  license: MIT
  license_family: MIT
  summary: Engine.IO server
  summary: Adds caching support to your Flask application
  description: A fork of the Flask-cache extension which adds easy cache support to Flask.
  doc_url: https://python-engineio.readthedocs.io
  dev_url: https://github.com/miguelgrinberg/python-engineio

extra:
  recipe-maintainers:
    - pmlandwehr
    - ReimarBauer
    - synapticarbors
